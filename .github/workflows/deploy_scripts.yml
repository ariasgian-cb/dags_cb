# Implanta os scripts de inicialização do Dataproc para o bucket GCS ao fazer push na branch main.
# Requer o seguinte GitHub Secret configurado no repositório:
#   - GCP_SA_KEY: JSON completo da Service Account com permissão de escrita no bucket

name: Deploy Scripts to Cloud Composer

on:
  push:
    branches:
      - master
    paths:
      - "scripts/**.sh"

jobs:
  deploy:
    name: Copy Scripts to GCS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Autenticação no GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configurar Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Copiar scripts para o bucket GCS
        run: |
          gsutil -m cp scripts/*.sh gs://bucket-via-gcb-ia-tributario-hlg-composer/dags/scripts/
